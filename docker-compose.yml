services:
  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/trading_engine.db
      PORT: 8000
      ENVIRONMENT: development
      AUTO_CREATE_SCHEMA: "true"
    volumes:
      - trading-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  trading-data:
